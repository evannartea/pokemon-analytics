<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Pokédex</title>

        <!-- Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

        <!-- Custom CSS -->
        <link rel="stylesheet" href="css/styles.css">
    </head>
    <body>
        <div class="grid-container">

            <!-- Header -->
            <header class="header">
                <img src="images/pokemon-logo.svg.png" alt="Pokemon Logo" height="150" width="400">
            </header>
            <!-- End Header -->
            
            <!-- Main -->
            <main class="main-container">
                <div class="pokedex-wrapper">
                    <img src="images/pokedex-image.png" alt="Pokedex Image">

                    <!-- Screen -->
                    <div class="screen-wrapper">
                        
                    </div>

                    <!-- Decorations -->
                    <span id="red-circle" class="absolute"></span>
                    <span id="black-lines" class="absolute"></span>
                    <span id="red-line" class="absolute"></span>
                    <span id="blue-line" class="absolute"></span>

                    <!--Search Form -->
                    <form id="search-wrapper" class="absolute">
                        <input id="search-box" class="absolute" type="text" placeholder="SEARCH POKéMON">
                    </form>

                    <!-- Buttons -->
                    <button id="reset-button" class="absolute" type="button">RESET</button>
                    <button id="left-button" class="absolute" type="button"><</button>
                    <button id="right-button" class="absolute" type="button">></button>
                </div>
            </main>
            <!-- End Main -->
             
        </div>

        <!-- Custom JS -->
        <script src=""></script>
    </body>
</html>
